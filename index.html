<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

:root{
--black:#030304;
--black-soft:#08080b;
--card:#1a1a1f;
--card-light:#26262d;
--silver:#f1f2f4;
--silver-dim:#9da0a6;
--edge:#ffffff40;
--accent:#9fdcff;
--error:#ff6b6b;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:'Cairo',sans-serif;
background:
radial-gradient(circle at top,rgba(255,255,255,.08),transparent 45%),
repeating-radial-gradient(circle,
rgba(255,255,255,.14) 0 1px,
transparent 1px 42px),
linear-gradient(180deg,var(--black),var(--black-soft));
display:flex;
justify-content:center;
align-items:flex-start;
height:100vh;
padding-top:80px;
overflow:hidden;
color:var(--silver);
}

.emoji-bg{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
}

.emoji{
position:absolute;
width:2px;
height:2px;
background:#fff;
border-radius:50%;
box-shadow:0 0 10px #fff;
animation:float 15s linear infinite;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(-150vh)}
}

.container{
position:relative;
z-index:1;
background:
linear-gradient(145deg,rgba(255,255,255,.1),rgba(255,255,255,.02)),
linear-gradient(180deg,var(--card-light),var(--card));
backdrop-filter:blur(22px);
border-radius:30px;
padding:30px;
min-width:300px;
text-align:center;
border:1px solid var(--edge);
box-shadow:0 50px 100px rgba(0,0,0,.95);
opacity:0;
transform:rotateX(30deg) translateY(40px);
animation:cardEnter 1.2s ease forwards;
}

@keyframes cardEnter{
to{opacity:1;transform:rotateX(0) translateY(0)}
}

h2{
margin-bottom:26px;
letter-spacing:2px;
color:#fff;
}

input{
width:190px;
height:32px;
padding:0 22px;
font-size:14px;
border-radius:36px;
border:1px solid var(--edge);
background:#070709;
color:#fff;
text-align:center;
outline:none;
box-shadow:
inset 0 3px 4px rgba(255,255,255,.25),
inset 0 -3px 6px rgba(0,0,0,.9),
0 16px 30px rgba(0,0,0,.95);
margin:8px 0;
}

button{
padding:8px 24px;
margin:20px 4px 0;
border-radius:30px;
background:#15151a;
border:1px solid var(--edge);
color:#fff;
cursor:pointer;
}

button:disabled{opacity:.2}
</style>
</head>

<body>

<div class="emoji-bg" id="emojiBg"></div>

<div class="container">

<h2>Login</h2>

<input id="username" type="text" placeholder="Username">
<br>
<input id="password" type="password" placeholder="Password">

<div class="buttons">
<button onclick="login()">Login</button>
</div>

</div>

<script>

/* الخلفية المتحركة */
(()=>{
const bg=document.getElementById('emojiBg');
for(let i=0;i<190;i++){
const d=document.createElement('div');
d.className='emoji';
d.style.left=Math.random()*innerWidth+'px';
d.style.top=(Math.random()*innerHeight+innerHeight)+'px';
d.style.animationDelay=(-Math.random()*20)+'s';
d.style.animationDuration=(15+Math.random()*15)+'s';
bg.appendChild(d);
}
})();

/* تسجيل الدخول (محلي فقط) */
function login(){

const user=document.getElementById("username").value;
const pass=document.getElementById("password").value;

/* بيانات افتراضية */
if(user==="admin" && pass==="1234"){

window.location.href="dashboard.html";

}else{

alert("Wrong Username or Password");

}

}

</script>

</body>
</html>
