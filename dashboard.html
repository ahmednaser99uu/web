<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

:root{
--black:#030304;
--black-soft:#08080b;
--card:#1a1a1f;
--card-light:#26262d;
--silver:#f1f2f4;
--edge:#ffffff40;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:'Cairo',sans-serif;
background:
radial-gradient(circle at top,rgba(255,255,255,.08),transparent 45%),
repeating-radial-gradient(circle,
rgba(255,255,255,.14) 0 1px,
transparent 1px 42px),
linear-gradient(180deg,var(--black),var(--black-soft));
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:var(--silver);
overflow:hidden;
}

.emoji-bg{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
}

.emoji{
position:absolute;
width:2px;
height:2px;
background:#fff;
border-radius:50%;
box-shadow:0 0 10px #fff;
animation:float 15s linear infinite;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(-150vh)}
}

.container{
position:relative;
z-index:1;
background:
linear-gradient(145deg,rgba(255,255,255,.1),rgba(255,255,255,.02)),
linear-gradient(180deg,var(--card-light),var(--card));
backdrop-filter:blur(22px);
border-radius:30px;
padding:40px;
text-align:center;
border:1px solid var(--edge);
box-shadow:0 50px 100px rgba(0,0,0,.95);
}

h1{
margin-bottom:20px;
}

.time{
font-size:40px;
margin:10px 0;
}

.date{
font-size:20px;
opacity:.8;
}

button{
margin-top:20px;
padding:10px 25px;
border-radius:30px;
border:1px solid var(--edge);
background:#15151a;
color:#fff;
cursor:pointer;
}

</style>
</head>

<body>

<div class="emoji-bg" id="emojiBg"></div>

<div class="container" id="content">
<h1>الوقت الحالي</h1>
<div class="time" id="time"></div>
<div class="date" id="date"></div>
</div>

<script>

(()=>{
const bg=document.getElementById('emojiBg');

for(let i=0;i<190;i++){

const d=document.createElement('div');
d.className='emoji';

d.style.left=Math.random()*innerWidth+'px';
d.style.top=(Math.random()*innerHeight+innerHeight)+'px';
d.style.animationDelay=(-Math.random()*20)+'s';
d.style.animationDuration=(15+Math.random()*15)+'s';

bg.appendChild(d);

}

})();



if(!ok){

document.getElementById("content").innerHTML = `
<h1>يجب تسجيل الدخول أولاً</h1>
<button onclick="goLogin()">العودة لصفحة تسجيل الدخول</button>
`;

return;

}

function updateTime(){

const now=new Date();

const time=now.toLocaleTimeString();
const date=now.toLocaleDateString();

document.getElementById("time").textContent=time;
document.getElementById("date").textContent=date;

}

setInterval(updateTime,1000);
updateTime();

})();

function goLogin(){
window.location.href="/";
}

</script>

</body>
</html>
